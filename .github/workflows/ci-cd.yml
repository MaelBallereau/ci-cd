name: Python CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security audit
        run: |
          pip-audit \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727
        # CVE-2025-54121 / CVE-2025-62727 : starlette (dep transitoire de fastapi).
        # Le patch exige starlette >= 0.47.2 / 0.49.1, incompatible avec fastapi 0.115.x.
        # À retirer dès que fastapi supporte starlette >= 0.47.

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-app:latest .

  deploy:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Deploy
        run: |
          echo "Déploiement de l'application"
          echo "Image Docker prête à être déployée"