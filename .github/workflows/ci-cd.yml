name: Python CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security audit
        run: |
          pip-audit \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727
        # CVE-2025-54121 / CVE-2025-62727 : starlette (dep transitoire de fastapi).
        # Le patch exige starlette >= 0.47.2 / 0.49.1, incompatible avec fastapi 0.115.x.
        # À retirer dès que fastapi supporte starlette >= 0.47.

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

  api-curl-test:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test API with curl
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          trap 'kill "$API_PID"' EXIT

          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ > /tmp/root.json; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:8000/
          curl --fail --silent \
            -X POST http://127.0.0.1:8000/items \
            -H "Content-Type: application/json" \
            -d '{"name":"pipeline-test","price":9.99}' \
            --output /tmp/item.json
          cat /tmp/item.json
          curl --fail --silent http://127.0.0.1:8000/items/1

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
      - test
      - api-curl-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-app:latest .

  deploy:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Deploy
        run: |
          echo "Déploiement de l'application"
          echo "Image Docker prête à être déployée"
